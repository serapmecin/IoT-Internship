<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı IoT Konum Takip Paneli</title>
    <!-- Leaflet Harita Kütüphanesi -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .card {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            min-width: 240px;
        }
        .card h3 { margin: 0 0 10px 0; color: #333; font-size: 16px; }
        .card p { margin: 5px 0; color: #666; font-size: 14px; }
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #2ed573;
            border-radius: 50%;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3><span class="status"></span> LoRa Canlı Takip</h3>
        <p><strong>Son Enlem:</strong> <span id="lat">Yükleniyor...</span></p>
        <p><strong>Son Boylam:</strong> <span id="lng">Yükleniyor...</span></p>
        <p><strong>Toplam Konum:</strong> <span id="count">0</span></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([39.92077, 32.85411], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markersGroup = L.layerGroup().addTo(map);
        let pathLine = L.polyline([], {color: '#ff4757', weight: 4, opacity: 0.7}).addTo(map);

        async function loadLastLocation() {
            try {
                // Her istekte benzersiz sayı (timestamp) ile GitHub raw linkinden çekiyoruz
                const uniqueUrl = 'https://raw.githubusercontent.com/serapmecin/IoT-Internship/main/konum_loglari.md?v=' + Date.now();
                const response = await fetch(uniqueUrl);
                
                if (!response.ok) throw new Error("Veri çekilemedi");

                const text = await response.text();

                // Enlem, boylam çiftlerini ayıklar
                const regex = /(-?\d{1,2}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)/g;
                let matches = [];
                let match;

                while ((match = regex.exec(text)) !== null) {
                    const lat = parseFloat(match[1]);
                    const lng = parseFloat(match[2]);
                    
                    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                        matches.push([lat, lng]);
                    }
                }
                
                if (matches.length > 0) {
                    markersGroup.clearLayers();
                    
                    matches.forEach((coord, index) => {
                        const isLast = (index === matches.length - 1);
                        const marker = L.marker(coord).addTo(markersGroup);
                        
                        if (isLast) {
                            marker.bindPopup(`<b>Son Konum (${index + 1})</b><br>${coord[0]}, ${coord[1]}`).openPopup();
                        } else {
                            marker.bindPopup(`<b>Geçmiş Konum (${index + 1})</b><br>${coord[0]}, ${coord[1]}`);
                        }
                    });

                    pathLine.setLatLngs(matches);

                    const lastCoord = matches[matches.length - 1];
                    document.getElementById('lat').innerText = lastCoord[0];
                    document.getElementById('lng').innerText = lastCoord[1];
                    document.getElementById('count').innerText = matches.length;

                    map.setView(lastCoord, 14);
                }
            } catch (err) {
                console.error("Konum yükleme hatası:", err);
            }
        }

        // Sayfa açıldığında çalıştır ve her 5 saniyede bir dene
        loadLastLocation();
        setInterval(loadLastLocation, 5000);
    </script>
</body>
</html>
