<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LoRa Komuta Merkezi - Adım 2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .info-panel {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 260px;
        }
        .coord-box {
            background: #f1f5f9; padding: 8px; border-radius: 4px;
            margin-top: 4px; font-weight: bold; color: #0f172a; font-family: monospace;
        }
        button {
            width: 100%; padding: 10px; margin-top: 10px;
            border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .btn-connect { background: #0284c7; color: white; }
        .btn-connect:hover { background: #0369a1; }
        .btn-send { background: #10b981; color: white; }
        .btn-send:hover { background: #059669; }
        .btn-send:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        #logText {
            font-size: 11px; color: #64748b; margin-top: 10px; font-family: monospace; word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3 style="margin-top:0;">🎯 Hedef Gönderimi</h3>
        
        <!-- USB Bağlantı Butonu -->
        <button id="connectBtn" class="btn-connect" onclick="connectSerial()">1. Karta Bağlan (USB)</button>
        
        <hr style="margin: 12px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <div>Enlem (Lat):</div>
        <div id="latVal" class="coord-box">--.----</div>
        <br>
        <div>Boylam (Lng):</div>
        <div id="lngVal" class="coord-box">--.----</div>

        <!-- Gönder Butonu -->
        <button id="sendBtn" class="btn-send" onclick="sendData()" disabled>2. Koordinatı Gönder</button>
        
        <div id="logText">Durum: Bekleniyor...</div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([41.0082, 28.9784], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        var targetMarker = null;
        var selectedLat = null;
        var selectedLng = null;
        var port = null;
        var writer = null;

        // Harita Tıklama
        map.on('click', function(e) {
            selectedLat = e.latlng.lat;
            selectedLng = e.latlng.lng;

            document.getElementById('latVal').innerText = selectedLat.toFixed(6);
            document.getElementById('lngVal').innerText = selectedLng.toFixed(6);

            if (targetMarker) {
                targetMarker.setLatLng(e.latlng);
            } else {
                targetMarker = L.marker(e.latlng).addTo(map);
            }

            checkSendButtonStatus();
        });

        // 1. Seri Port (USB) Bağlantı Fonksiyonu
        async function connectSerial() {
            if ("serial" in navigator) {
                try {
                    port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 9600 });
                    writer = port.writable.getWriter();

                    document.getElementById('connectBtn').innerText = "✅ Karta Bağlandı";
                    document.getElementById('connectBtn').style.background = "#059669";
                    document.getElementById('logText').innerText = "Durum: USB Bağlantısı Başarılı!";
                    
                    checkSendButtonStatus();
                } catch (err) {
                    document.getElementById('logText').innerText = "Hata: " + err;
                }
            } else {
                alert("Tarayıcınız Web Serial desteklemiyor. Lütfen Chrome veya Edge kullanın.");
            }
        }

        function checkSendButtonStatus() {
            if (writer && selectedLat && selectedLng) {
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // 2. Veri Gönderme Fonksiyonu
        async function sendData() {
            if (!writer || !selectedLat || !selectedLng) return;

            // Kartın kolayca okuyabileceği format: LAT,LNG\n
            var message = selectedLat.toFixed(6) + "," + selectedLng.toFixed(6) + "\n";
            var encoder = new TextEncoder();

            try {
                await writer.write(encoder.encode(message));
                document.getElementById('logText').innerText = "Gönderildi: " + message;
            } catch (err) {
                document.getElementById('logText').innerText = "Gönderim Hatası: " + err;
            }
        }
    </script>
</body>
</html>
