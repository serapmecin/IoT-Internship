<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Online LoRa Komuta Merkezi - 3 Kelime Sistemi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-panel {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 310px; max-height: 85vh; overflow-y: auto;
        }
        .target-list {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 8px; margin: 10px 0; max-height: 200px; overflow-y: auto;
        }
        .target-item {
            font-family: monospace; font-size: 11px; padding: 6px 0;
            border-bottom: 1px dashed #cbd5e1; color: #1e293b;
        }
        .w3w-tag {
            color: #e11d48; font-weight: bold; display: block; margin-top: 2px; font-size: 13px;
        }
        .target-item:last-child { border-bottom: none; }
        button {
            width: 100%; padding: 10px; margin-top: 6px;
            border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; transition: 0.2s; color: white;
        }
        .btn-send { background: #10b981; }
        .btn-send:hover { background: #059669; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #status { font-size: 11px; color: #0284c7; margin-top: 8px; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3 style="margin-top:0;">🌐 3 Kelimeli LoRa Komut</h3>
        <p style="font-size:12px; color:#64748b;">Haritadan seçilen noktalar 3 kelimelik özel adrese dönüştürülüp fırlatılır.</p>

        <div style="font-size: 13px; font-weight: bold;">Seçilen Hedefler (<span id="count">0</span>):</div>
        <div id="targetList" class="target-list">
            <div style="color: #94a3b8; font-size: 12px; text-align: center;">Henüz nokta seçilmedi</div>
        </div>

        <button id="sendBtn" class="btn-send" onclick="sendAllCommands()" disabled>Tüm 3 Kelimelik Hedefleri Yayınla</button>
        <button id="clearBtn" class="btn-clear" onclick="clearAllTargets()" disabled>Listeyi Temizle</button>
        <div id="status">Sunucuya bağlanılıyor...</div>
    </div>

    <div id="map"></div>

    <script>
        // Türkçe Kelime Havuzumuz
        var wordList1 = ["deniz", "bulut", "rüzgar", "güneş", "toprak", "orman", "nehir", "yıldız", "gece", "şafak", "mavi", "yeşil", "kırmızı", "altın", "gümüş", "kanyon", "vadi", "ada", "tepe", "sahil"];
        var wordList2 = ["doku", "destek", "örnek", "süreç", "yolcu", "hedef", "pusula", "harita", "çizgi", "nokta", "sinyal", "dalga", "uydu", "telsiz", "kutucu", "simge", "kod", "fener", "yol", "iz"];
        var wordList3 = ["sevgiler", "umutlar", "adım", "sistem", "yolculuk", "sefer", "durak", "bölge", "alan", "merkez", "noktası", "takip", "izlem", "haber", "mesaj", "veri", "akış", "bağlantı", "kontrol", "komut"];

        // Koordinatı sabitleştirip benzersiz 3 kelimeye dönüştüren algoritmamız
        function generate3Words(lat, lng) {
            var latNum = Math.abs(Math.floor(parseFloat(lat) * 100000));
            var lngNum = Math.abs(Math.floor(parseFloat(lng) * 100000));

            var w1 = wordList1[latNum % wordList1.length];
            var w2 = wordList2[lngNum % wordList2.length];
            var w3 = wordList3[(latNum + lngNum) % wordList3.length];

            return "///" + w1 + "." + w2 + "." + w3;
        }

        var map = L.map('map').setView([41.0082, 28.9784], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OpenStreetMap' }).addTo(map);

        var targetList = [];
        var markersList = [];

        var client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        var topicName = "serap_lora_internship/target_command";

        client.on('connect', function () {
            document.getElementById('status').innerText = "✅ Bulut Sunucu Bağlantısı Hazır";
        });

        map.on('click', function(e) {
            var lat = e.latlng.lat.toFixed(6);
            var lng = e.latlng.lng.toFixed(6);
            var index = targetList.length + 1;

            var threeWords = generate3Words(lat, lng);

            var targetItem = { index: index, lat: lat, lng: lng, w3w: threeWords };
            targetList.push(targetItem);

            var marker = L.marker(e.latlng).addTo(map)
                .bindPopup("<b>Hedef #" + index + "</b><br><span style='color:#e11d48; font-weight:bold;'>" + threeWords + "</span><br>" + lat + ", " + lng).openPopup();
            markersList.push(marker);

            updateUI();
        });

        function updateUI() {
            var listDiv = document.getElementById('targetList');
            document.getElementById('count').innerText = targetList.length;

            if (targetList.length === 0) {
                listDiv.innerHTML = '<div style="color: #94a3b8; font-size: 12px; text-align: center;">Henüz nokta seçilmedi</div>';
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('clearBtn').disabled = true;
                return;
            }

            var html = '';
            targetList.forEach(function(item) {
                html += '<div class="target-item">' +
                    '📍 <b>#' + item.index + ':</b> ' + item.lat + ', ' + item.lng +
                    '<span class="w3w-tag">' + item.w3w + '</span>' +
                '</div>';
            });
            listDiv.innerHTML = html;

            document.getElementById('sendBtn').disabled = false;
            document.getElementById('clearBtn').disabled = false;
        }

        function clearAllTargets() {
            targetList = [];
            markersList.forEach(function(m) { map.removeLayer(m); });
            markersList = [];
            updateUI();
            document.getElementById('status').innerText = "Liste ve pinler temizlendi.";
        }

        function sendAllCommands() {
            if (targetList.length === 0) return;

            document.getElementById('sendBtn').disabled = true;
            var sentCount = 0;

            targetList.forEach(function(item, idx) {
                setTimeout(function() {
                    // ESP32 ve LoRa'ya doğrudan 3 kelimelik adresi fırlatıyoruz!
                    var payload = "HEDEF-" + item.index + ": " + item.w3w + " [" + item.lat + "," + item.lng + "]";
                    client.publish(topicName, payload);
                    sentCount++;
                    document.getElementById('status').innerText = "🚀 Gönderiliyor (" + sentCount + "/" + targetList.length + "): " + item.w3w;

                    if (sentCount === targetList.length) {
                        setTimeout(function() {
                            document.getElementById('status').innerText = "🎉 Tüm 3 kelimeli hedefler yayınlandı!";
                            document.getElementById('sendBtn').disabled = false;
                        }, 1000);
                    }
                }, idx * 4000);
            });
        }
    </script>
</body>
</html>
